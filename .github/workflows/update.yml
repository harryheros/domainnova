name: Update China Domain List

on:
  schedule:
    - cron: "0 2 * * 1"   # Every Monday at 02:00 UTC
  workflow_dispatch:

# Clean up logs and set Node version env
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Validate manual sources
        run: python sources/scripts/validate_manual_sources.py
        continue-on-error: true

      - name: Build domain artifacts
        run: python sources/scripts/build_domains.py

      - name: Build metadata artifacts
        run: python sources/scripts/build_metadata.py --all

      - name: Show stats
        run: |
          echo "=== Stats ==="
          [ -f data/stats.json ] && cat data/stats.json || echo "stats.json missing"
          echo ""
          echo "=== dist/domains.txt (first 20 lines) ==="
          [ -f dist/domains.txt ] && head -20 dist/domains.txt || echo "domains.txt missing"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add all potential output files
          git add data/*.json data/*.csv data/*.yaml dist/*.txt

          # Improved logic: Check if there are staged changes
          if git diff --cached --quiet; then
            echo "No changes detected. Skipping commit."
          else
            echo "Changes detected. Committing..."
            git commit -m "chore: auto-update $(date -u +%Y-%m-%d)"
            git push
          fi
