name: Update China Domain List

on:
  schedule:
    - cron: "0 2 * * 1"   # Every Monday at 02:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Validate manual sources
        run: python sources/scripts/validate_manual_sources.py
        continue-on-error: true

      - name: Build domain artifacts
        # CN CIDR data is fetched live from ipnova at runtime.
        # Set DOMAINNOVA_RDAP=1 to also enable RDAP registrar/registrant signals.
        run: python sources/scripts/build_domains.py

      - name: Build metadata artifacts
        run: python sources/scripts/build_metadata.py --all

      - name: Show stats
        run: |
          echo "=== Stats ==="
          cat data/stats.json
          echo ""
          echo "=== dist/domains.txt (first 20 lines) ==="
          head -20 dist/domains.txt

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            data/domains.csv \
            data/stats.json \
            data/domains_metadata.json \
            data/domains_metadata.yaml \
            data/domains_metadata.csv \
            data/metadata_stats.json \
            data/manual_source_validation.json \
            dist/domains.txt \
            dist/seed_domains.txt \
            dist/extended_domains.txt
          git diff --cached --quiet && echo "No changes." || (
            git commit -m "chore: auto-update $(date -u +%Y-%m-%d)"
            git push
          )
