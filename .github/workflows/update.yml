name: Update DomainNova Dataset

on:
  schedule:
    - cron: "0 2 * * 1"    # Weekly: every Monday 02:00 UTC (build)
    - cron: "0 3 1 * *"    # Monthly: 1st of month 03:00 UTC (discovery agents)
  workflow_dispatch:
    inputs:
      run_agents:
        description: "Run discovery agents (yes/no)"
        required: false
        default: "no"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Validate manual sources
        run: python sources/scripts/validate_manual_sources.py

      # Discovery agents - run monthly or on manual trigger
      - name: Run discovery agents
        if: |
          github.event.schedule == '0 3 1 * *' ||
          github.event.inputs.run_agents == 'yes'
        run: |
          mkdir -p sources/discovery_agents
          echo "[+] Running upstream fetch agent..."
          python sources/discovery_agents/agent_upstream_fetch.py
          echo "[+] Running IP neighbor agent..."
          python sources/discovery_agents/agent_ip_neighbor.py
          echo "[+] Running CT logs agent..."
          python sources/discovery_agents/agent_ct_logs.py
      - name: Restore discovery stats cache
        uses: actions/cache@v4
        with:
          path: data/discovery_stats.json
          key: discovery-stats-${{ github.ref_name }}
          restore-keys: |
            discovery-stats-

      - name: Build domain artifacts
        run: python sources/scripts/build_domains.py

      - name: Save discovery stats cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/discovery_stats.json
          key: discovery-stats-${{ github.ref_name }}

      - name: Build metadata artifacts
        run: python sources/scripts/build_metadata.py --all

      - name: Show stats
        run: |
          echo "=== Stats ==="
          [ -f data/stats.json ] && cat data/stats.json || echo "stats.json missing"
          echo ""
          for region in cn hk mo tw jp kr sg; do
            f="dist/domains_${region}.txt"
            echo "=== $f (first 10 lines) ==="
            if [ -f "$f" ]; then
              head -10 "$f"
              echo "  -- total lines: $(grep -cv '^#' "$f" | head -1)"
            else
              echo "$f missing"
            fi
            echo ""
          done
          echo "=== discovery.txt count ==="
          [ -f sources/manual/discovery.txt ] && \
            grep -v "^#" sources/manual/discovery.txt | grep -v "^$" | wc -l || \
            echo "discovery.txt missing"

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Add the entire data/ and dist/ directories plus the manually-
          # modified discovery/extended source files. Using directory-level
          # paths instead of an explicit file list means future additions
          # to either output directory are picked up automatically rather
          # than silently dropped.
          git add data/ dist/ \
            sources/manual/discovery.txt \
            sources/manual/extended.txt
          if git diff --cached --quiet; then
            echo "No changes detected. Skipping commit."
          else
            git commit -m "chore: auto-update $(date -u +%Y-%m-%d)"
            git push
          fi

  notify-failure:
    runs-on: ubuntu-latest
    needs: update
    if: ${{ needs.update.result == 'failure' }}
    permissions:
      issues: write

    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `DomainNova update failed — ${new Date().toISOString().split('T')[0]}`;
            const body = [
              '## DomainNova automated update failed',
              '',
              `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Possible causes:',
              '- DoH upstream unavailable or DNS resolution degraded',
              '- ipnova CIDR data unavailable or corrupted',
              '- Discovery agent failure',
              '- Build script validation failure',
              '',
              'Please investigate the workflow logs and re-run manually if needed.',
            ].join('\n');

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure',
              per_page: 5,
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['ci-failure'],
              });
            }
