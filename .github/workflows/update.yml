name: Update China Domain List

on:
  schedule:
    - cron: "0 2 * * 1"    # Weekly: every Monday 02:00 UTC (build)
    - cron: "0 3 1 * *"    # Monthly: 1st of month 03:00 UTC (discovery agents)
  workflow_dispatch:
    inputs:
      run_agents:
        description: "Run discovery agents (yes/no)"
        required: false
        default: "no"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Validate manual sources
        run: python sources/scripts/validate_manual_sources.py
        continue-on-error: true

      # Discovery agents - run monthly or on manual trigger
      - name: Run discovery agents
        if: |
          github.event.schedule == '0 3 1 * *' ||
          github.event.inputs.run_agents == 'yes'
        run: |
          mkdir -p sources/discovery_agents
          echo "[+] Running upstream fetch agent..."
          python sources/discovery_agents/agent_upstream_fetch.py
          echo "[+] Running IP neighbor agent..."
          python sources/discovery_agents/agent_ip_neighbor.py
          echo "[+] Running CT logs agent..."
          python sources/discovery_agents/agent_ct_logs.py
        continue-on-error: true

      - name: Build domain artifacts
        run: python sources/scripts/build_domains.py

      - name: Build metadata artifacts
        run: python sources/scripts/build_metadata.py --all

      - name: Show stats
        run: |
          echo "=== Stats ==="
          [ -f data/stats.json ] && cat data/stats.json || echo "stats.json missing"
          echo ""
          for region in cn hk mo tw; do
            f="dist/domains_${region}.txt"
            echo "=== $f (first 10 lines) ==="
            if [ -f "$f" ]; then
              head -10 "$f"
              echo "  -- total lines: $(grep -cv '^#' "$f" | head -1)"
            else
              echo "$f missing"
            fi
            echo ""
          done
          echo "=== discovery.txt count ==="
          [ -f sources/manual/discovery.txt ] && \
            grep -v "^#" sources/manual/discovery.txt | grep -v "^$" | wc -l || \
            echo "discovery.txt missing"

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            data/*.json \
            data/*.csv \
            data/*.yaml \
            dist/*.txt \
            sources/manual/discovery.txt \
            sources/manual/extended.txt
          if git diff --cached --quiet; then
            echo "No changes detected. Skipping commit."
          else
            git commit -m "chore: auto-update $(date -u +%Y-%m-%d)"
            git push
          fi
